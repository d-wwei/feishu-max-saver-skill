<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
body { margin: 0; padding: 40px; background: #fff; font-family: -apple-system, "PingFang SC", sans-serif; }
.container { max-width: 580px; margin: 0 auto; }
.title { text-align: center; font-size: 20px; font-weight: 800; margin-bottom: 8px; color: #1a1a1a; }
.subtitle { text-align: center; font-size: 14px; color: #ef4444; font-weight: 600; margin-bottom: 24px; }
.row { display: flex; align-items: center; padding: 14px 16px; margin-bottom: 8px; border-radius: 8px; background: #fef2f2; }
.icon { font-size: 24px; margin-right: 14px; flex-shrink: 0; }
.name { flex: 1; font-size: 15px; font-weight: 700; color: #1a1a1a; }
.tag { font-size: 11px; padding: 3px 10px; border-radius: 99px; background: #fee2e2; color: #991b1b; white-space: nowrap; }
.ours { display: flex; align-items: center; padding: 14px 16px; margin-bottom: 8px; border-radius: 8px; background: #f0fdf4; border: 2px solid #22c55e; }
.ours .name { color: #166534; }
.ours .tag { background: #bbf7d0; color: #166534; }
.footer { text-align: center; margin-top: 20px; font-size: 13px; color: #999; }
</style></head>
<body>
<div class="container">
  <div class="title">5 个独占企业管理领域</div>
  <div class="subtitle">官方 CLI 至今空白，我们已覆盖</div>
  <div class="ours">
    <div class="icon">✍️</div>
    <div class="name">审批流程</div>
    <div class="tag">list / get / create</div>
  </div>
  <div class="ours">
    <div class="icon">🎯</div>
    <div class="name">OKR 目标管理</div>
    <div class="tag">list / get / periods</div>
  </div>
  <div class="ours">
    <div class="icon">⏰</div>
    <div class="name">考勤记录</div>
    <div class="tag">tasks / stats / shifts</div>
  </div>
  <div class="ours">
    <div class="icon">📊</div>
    <div class="name">汇报规则</div>
    <div class="tag">rules / tasks</div>
  </div>
  <div class="ours">
    <div class="icon">🛡️</div>
    <div class="name">管理后台</div>
    <div class="tag">audit / dept-stats / user-stats</div>
  </div>
  <div class="footer">官方 CLI GitHub Issues 中仍在排队</div>
</div>
</body></html>
