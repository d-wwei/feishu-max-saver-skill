<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
body { margin: 0; padding: 40px; background: #fff; font-family: -apple-system, "PingFang SC", sans-serif; }
.container { max-width: 620px; margin: 0 auto; }
.title { text-align: center; font-size: 20px; font-weight: 800; margin-bottom: 24px; color: #1a1a1a; }
.subtitle { text-align: center; font-size: 14px; color: #22c55e; font-weight: 600; margin-bottom: 24px; }
.row { display: flex; align-items: center; padding: 12px 16px; margin-bottom: 8px; border-radius: 8px; background: #f8faf8; }
.check { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; margin-right: 14px; background: #22c55e; color: #fff; }
.gap-name { flex: 1; font-size: 14px; font-weight: 600; color: #1a1a1a; text-decoration: line-through; text-decoration-color: #ef4444; text-decoration-thickness: 2px; }
.solution { font-size: 12px; color: #666; max-width: 260px; text-align: right; }
.progress { margin-top: 24px; text-align: center; }
.bar-bg { height: 12px; background: #e5e7eb; border-radius: 99px; overflow: hidden; margin: 8px 0; }
.bar-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); border-radius: 99px; width: 100%; }
.bar-label { font-size: 32px; font-weight: 900; color: #22c55e; }
</style></head>
<body>
<div class="container">
  <div class="title">与官方 CLI 的能力差距</div>
  <div class="subtitle">6 / 6 已解决</div>
  <div class="row">
    <div class="check">✓</div>
    <div class="gap-name">完整邮件系统</div>
    <div class="solution">send / list / draft / folder</div>
  </div>
  <div class="row">
    <div class="check">✓</div>
    <div class="gap-name">WebSocket 事件订阅</div>
    <div class="solution">event subscribe + 自动重连</div>
  </div>
  <div class="row">
    <div class="check">✓</div>
    <div class="gap-name">白板图表渲染</div>
    <div class="solution">Mermaid → PNG → block</div>
  </div>
  <div class="row">
    <div class="check">✓</div>
    <div class="gap-name">交互式 OAuth 登录</div>
    <div class="solution">auth login + refresh_token</div>
  </div>
  <div class="row">
    <div class="check">✓</div>
    <div class="gap-name">子任务和提醒</div>
    <div class="solution">subtask / reminder / follower</div>
  </div>
  <div class="row">
    <div class="check">✓</div>
    <div class="gap-name">文档插入图片</div>
    <div class="solution">upload-image / upload-file</div>
  </div>
  <div class="progress">
    <div class="bar-bg"><div class="bar-fill"></div></div>
    <div class="bar-label">100%</div>
  </div>
</div>
</body></html>
